    <!-- GitHub Pages SPA redirect handler -->
    <script type="text/javascript">
      // If the URL contains a redirect query string from 404.html, restore the path
      (function() {
        var redirect = document.location.search;
        if (redirect && redirect[0] === '?') {
          var path = redirect.slice(1).replace(/~and~/g, '&');
          if (path[0] === '/') {
            var cleanUrl = document.location.protocol + '//' + document.location.host +
              document.location.pathname + path + document.location.hash;
            window.history.replaceState(null, null, cleanUrl);
          }
        }
      })();
    </script>
