<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages — redirect script
      // When a user refreshes on a non-root route, GitHub Pages serves this 404.html,
      // which then redirects back to the SPA with the original path preserved in the query string.
      var pathPrefix = '/portafolio/';
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        pathPrefix + '?/' +
        l.pathname.slice(pathPrefix.length).replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
